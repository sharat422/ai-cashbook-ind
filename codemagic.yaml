# Codemagic CI/CD — AI Smart CashBook (React Native 0.76.5)
#
# Two ready-to-run workflows:
#   * android — builds a release APK (self-signed with the bundled debug
#     keystore so it runs without extra credentials).
#   * ios     — installs Pods and compiles for the iOS Simulator with signing
#     disabled, so it builds green on CI without certificates. To produce a
#     signed device IPA, add a code-signing step + `xcodebuild archive`.
#
# Both copy `.env.example` to `.env` so react-native-config has sane defaults.

workflows:
  android:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 18.20.4
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - node_modules
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Seed .env for react-native-config
        script: cp -f .env.example .env || true
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Build Android release APK
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/mapping.txt

  ios:
    name: iOS App Store Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AICashBook
      
    environment:
      node: 18.20.4
      # Pin to an Xcode that RN 0.76.5 + its pods (Folly/RNSVG C++) compile
      # against. "latest" resolves to Xcode 26.x, whose newer clang/libc++
      # breaks RN 0.76.5's C++ (e.g. RNSVGLayoutableShadowNode.cpp).
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.syntaro.aismartcashbook
      vars:
        XCODE_WORKSPACE: "AISmartCashBook.xcworkspace"
        XCODE_SCHEME: "AISmartCashBook"
        BUNDLE_ID: "com.syntaro.aismartcashbook"
        
    cache:
      cache_paths:
        # ios/Pods is intentionally NOT cached — pod install runs clean every
        # build so dependency version changes (e.g. RNSVG pin) never leave
        # stale generated Pods artifacts behind.
        - node_modules
    scripts:
      - name: Install npm dependencies
        script: npm ci
        
      - name: Seed .env for react-native-config
        script: cp -f .env.example .env || true
        
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle install
          bundle exec pod install
          
      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/ios/AISmartCashBook.xcodeproj" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      
      - name: Increment iOS build number
        script: |
          cd "$CM_BUILD_DIR/ios"
          agvtool new-version -all "$PROJECT_BUILD_NUMBER"    
          
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
       - build/ios/ipa/*.ipa
       - /tmp/xcodebuild_logs/*.log
       - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
